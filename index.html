<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makita DCM501</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxygen:wght@400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="margin-fill margin-fill-hero margin-fill-left" aria-hidden="true"></div>
    <div class="margin-fill margin-fill-hero margin-fill-right" aria-hidden="true"></div>
    <div class="margin-fill icon-band-fill" aria-hidden="true"></div>
    <div class="margin-fill margin-fill-lifestyle margin-fill-left" aria-hidden="true"></div>
    <div class="margin-fill margin-fill-lifestyle margin-fill-right" aria-hidden="true"></div>
    <div class="margin-fill margin-fill-footer margin-fill-left" aria-hidden="true"></div>
    <div class="margin-fill margin-fill-footer margin-fill-right" aria-hidden="true"></div>
    <main class="desktop-page" aria-label="Pagina Makita DCM501 version computadora">
      <img class="fixed-header-strip" src="assets/header-fixed-original.webp" alt="" aria-hidden="true" />
      <nav class="desktop-nav" aria-label="Navegacion principal">
        <a href="#">INICIO</a>
        <a href="#">CARACTERISTICAS</a>
        <a href="#">FUNCIONES</a>
        <a href="#">COMPLEMENTOS</a>
        <a href="#">CONTACTO</a>
      </nav>
      <div class="transport-mask" aria-hidden="true"></div>
      <div class="transport-hover terrain-info" aria-label="Manija de transporte">
        <span>Práctica y plegable para trasladar<br />la cafetera con facilidad.</span>
      </div>
      <div class="deposit-mask" aria-hidden="true"></div>
      <div class="deposit-hover feature-hover terrain-info" aria-label="Tapa de depósito">
        <span>Protege el compartimento<br />del agua y se pliega fácilmente.</span>
      </div>
      <div class="battery-mask" aria-hidden="true"></div>
      <div class="battery-hover feature-hover terrain-info" aria-label="Porta baterías">
        <span>Compatible con baterías<br />de 12Vmax o 18V.</span>
      </div>
      <div class="steel-mask" aria-hidden="true"></div>
      <div class="steel-hover feature-hover terrain-info" aria-label="Taza de acero">
        <span>Térmica e inoxidable, encaja en la<br />máquina evitando derrames.</span>
      </div>
      <button class="terrain-trigger terrain-trigger-one" type="button" data-feature="transport" aria-label="Mostrar manija de transporte"></button>
      <button class="terrain-trigger terrain-trigger-two" type="button" data-feature="deposit" aria-label="Mostrar tapa de depósito"></button>
      <button class="terrain-trigger terrain-trigger-three" type="button" data-feature="steel" aria-label="Mostrar taza de acero"></button>
      <button class="terrain-trigger terrain-trigger-four" type="button" data-feature="battery" aria-label="Mostrar porta baterías"></button>
      <svg class="step-number-svg step-number-one" viewBox="214.62 6406.24 46.74 46.74" aria-hidden="true">
        <circle cx="237.99" cy="6429.61" r="23.37" />
        <path d="M238.08,6422.91h-4.19v-2.84c1.14,0,2.06-.1,2.75-.29.69-.19,1.24-.52,1.66-.97.41-.45.78-1.1,1.09-1.95h2.69v25.49h-4.01v-19.45Z" />
      </svg>
      <svg class="step-number-svg step-number-two" viewBox="771.93 6406 46.74 46.74" aria-hidden="true">
        <circle cx="795.3" cy="6429.37" r="23.37" />
        <path d="M789.33,6439.53c0-1.82.29-3.38.87-4.68.58-1.3,1.63-2.74,3.13-4.32,1.48-1.58,2.51-2.93,3.08-4.04.57-1.12.86-2.28.86-3.5,0-1.09-.18-1.85-.53-2.28-.35-.42-.87-.64-1.55-.64-1.38,0-2.08.84-2.08,2.51v2.73h-3.79v-2.48c0-2.06.51-3.65,1.53-4.75,1.02-1.1,2.5-1.66,4.44-1.66s3.42.55,4.44,1.66c1.02,1.1,1.53,2.69,1.53,4.75,0,1.55-.37,3.07-1.11,4.55-.74,1.48-2.02,3.18-3.84,5.1-1.19,1.26-1.99,2.29-2.4,3.08-.41.79-.62,1.63-.62,2.53v.55h7.61v3.64h-11.58v-2.77Z" />
      </svg>
      <svg class="step-number-svg step-number-three" viewBox="1309.86 6406.24 46.74 46.74" aria-hidden="true">
        <circle cx="1333.23" cy="6429.61" r="23.37" />
        <path d="M1328.77,6441.08c-1.01-1.09-1.51-2.66-1.51-4.7v-2.08h3.79v2.26c0,1.68.69,2.51,2.08,2.51.68,0,1.2-.21,1.55-.64.35-.42.53-1.17.53-2.24v-2.08c0-1.17-.21-2-.62-2.49-.41-.5-1.08-.75-2-.75h-1.35v-3.64h1.46c.8,0,1.4-.21,1.8-.62.4-.41.6-1.1.6-2.08v-1.86c0-.87-.18-1.52-.55-1.93-.36-.41-.85-.62-1.46-.62-1.29,0-1.93.79-1.93,2.37v1.68h-3.79v-1.35c0-2.04.5-3.61,1.51-4.7,1.01-1.09,2.46-1.64,4.35-1.64s3.37.54,4.37,1.62c1,1.08,1.49,2.64,1.49,4.68v.91c0,1.38-.23,2.49-.69,3.33-.46.84-1.18,1.44-2.15,1.8v.07c1.04.39,1.8,1.02,2.26,1.89.46.87.69,1.99.69,3.35v2.26c0,2.04-.5,3.6-1.51,4.68-1.01,1.08-2.49,1.62-4.46,1.62s-3.45-.55-4.46-1.64Z" />
      </svg>
      <button class="step-overlay step-overlay-one" type="button" aria-label="Verter"></button>
      <button class="step-overlay step-overlay-two" type="button" aria-label="Agregar"></button>
      <button class="step-overlay step-overlay-three" type="button" aria-label="Disfrutar"></button>
      <section class="color-swap" aria-label="Selector de color">
        <img class="color-product color-product-blue" src="assets/product-blue-trim.webp" alt="" />
        <img class="color-product color-product-red" src="assets/product-red-trim.webp" alt="" />
        <img class="color-product color-product-green" src="assets/product-green-trim.webp" alt="" />
        <div class="color-dots-cover" aria-hidden="true"></div>
        <button class="color-dot color-dot-blue" type="button" aria-label="Color azul"></button>
        <button class="color-dot color-dot-red" type="button" aria-label="Color rojo"></button>
        <button class="color-dot color-dot-green" type="button" aria-label="Color verde"></button>
      </section>
      <div class="footer-social-filled" aria-label="Redes sociales">
        <span class="social-icon social-instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="5" width="14" height="14" rx="4" />
            <circle cx="12" cy="12" r="3.3" />
            <circle cx="16.4" cy="7.6" r="1.1" />
          </svg>
        </span>
        <span class="social-icon social-facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.2 8.2H16V5.1c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V12H6.2v3.5h2.9V24h3.6v-8.5h3l.5-3.5h-3.5V9.8c0-1 .3-1.6 1.5-1.6Z" />
          </svg>
        </span>
        <span class="social-icon social-tiktok">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.2 3c.4 3 2.1 4.8 4.8 5v3.4c-1.6.1-3-.4-4.7-1.4v6.4c0 8.1-8.9 10.6-12.5 4.8-2.3-3.7-.9-10.2 6.5-10.5v3.6c-.5.1-1.1.2-1.6.4-1.5.5-2.3 1.5-2.1 3.2.4 3.2 6.2 4.1 5.7-2.1V3h3.9Z" />
          </svg>
        </span>
      </div>
      <img src="assets/desktop-design.png" alt="Diseno completo de la cafetera a bateria Makita DCM501" />
    </main>

    <main class="mobile-page" aria-label="Pagina Makita DCM501 version celular">
      <section class="mobile-slice hero">
        <nav class="topbar">
          <strong>Makita</strong>
          <button aria-label="Abrir menu"><span></span><span></span><span></span></button>
        </nav>
      </section>

      <section class="mobile-slice terrain"></section>
      <section class="mobile-slice detail-one"></section>
      <section class="mobile-slice detail-two"></section>
      <section class="mobile-slice steps"></section>
      <section class="mobile-slice lifestyle"></section>
      <section class="mobile-slice colors"></section>
      <footer class="mobile-slice footer"></footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
